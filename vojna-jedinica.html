<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8" />

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #0F1117; }
  #root { min-height: 100vh; }
  * { scrollbar-width: thin; scrollbar-color: #333A45 #0F1117; box-sizing: border-box; }
  input:focus, textarea:focus, select:focus { border-color: #CE1126 !important; }
  button:focus-visible { outline: 2px solid #CE1126; outline-offset: 2px; }
  textarea { resize: vertical; }
  select, input[type="datetime-local"] { color-scheme: dark; appearance: none; }
  a { color: inherit; }

  button { transition: filter .14s ease, transform .08s ease, border-color .15s ease, color .15s ease; }
  button:hover { filter: brightness(1.12); }
  button:active { transform: translateY(1px); }

  a.linkbtn, a.battle { transition: box-shadow .16s ease, transform .13s ease, background .15s ease; }
  a.linkbtn:hover, a.battle:hover { box-shadow: inset 0 0 0 1px #CE1126; transform: translateY(-1px); }

  .card { animation: fadeUp .34s cubic-bezier(.2,.7,.2,1) backwards; transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(0,0,0,.45); border-color: #3B4250; }
  .card-past { animation: fadeUp .34s ease backwards; transition: opacity .2s ease, border-color .18s ease; }
  .card-past:hover { opacity: .82 !important; }

  .view { animation: fadeIn .28s ease; }
  .dd { animation: popIn .15s ease; transform-origin: top left; }
  .dd-item { transition: box-shadow .12s ease; }
  .dd-item:hover { box-shadow: inset 0 0 0 999px rgba(255,255,255,.05); }

  .coll { display: grid; grid-template-rows: 0fr; opacity: 0; transition: grid-template-rows .26s ease, opacity .24s ease; }
  .coll.open { grid-template-rows: 1fr; opacity: 1; }
  .coll-inner { overflow: hidden; min-height: 0; }

  .chev { display: inline-block; transition: transform .22s ease; }
  .chev.open { transform: rotate(180deg); }

  .hrow { transition: box-shadow .12s ease; }
  .hrow:hover { box-shadow: inset 3px 0 0 #CE1126, inset 0 0 0 999px rgba(255,255,255,.028); }
  .head-btn { transition: background .14s ease; }
  .head-btn:hover { background: rgba(255,255,255,.03); }

  @keyframes fadeUp { from { opacity:0; transform: translateY(10px);} to { opacity:1; transform:none; } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes popIn { from { opacity:0; transform: scale(.97) translateY(-6px);} to { opacity:1; transform:none; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.35 } }
  .spin { display:inline-block; width:12px; height:12px; border:2px solid rgba(255,255,255,.25); border-top-color:#CE1126; border-radius:50%; animation: spin .7s linear infinite; }
  .live { display:inline-block; width:7px; height:7px; border-radius:50%; background:#5E8C4E; animation: pulse 1.8s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) { *, ::before, ::after { animation-duration:.001ms !important; transition-duration:.001ms !important; } }
</style>

function utcStamp(ts) { const d = new Date(ts), p = (n) => String(n).padStart(2, "0"); return `${p(d.getUTCDate())}/${p(d.getUTCMonth() + 1)} ${p(d.getUTCHours())}:${p(d.getUTCMinutes())}`; }
function hhmm(ts) { const d = new Date(ts), p = (n) => String(n).padStart(2, "0"); return `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`; }
function newId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function safeUrl(u) { const s = (u || "").trim(); return !s ? "" : (/^https?:\/\//i.test(s) ? s : "https://" + s); }
function inputToUtc(s) { if (!s) return null; const [dp, tp] = s.split("T"); if (!tp) return null; const [y, mo, d] = dp.split("-").map(Number); const [h, mi] = tp.split(":").map(Number); return Date.UTC(y, mo - 1, d, h, mi); }
async function apiGet(base, path) {
  const b = (base || "").replace(/\/+$/, "");
  if (!b) throw new Error("Proxy URL nije postavljen (Administracija › Živi podaci).");
  const r = await fetch(b + path);
  let d; try { d = await r.json(); } catch { throw new Error("Neispravan odgovor s proxyja (HTTP " + r.status + ")."); }
  if (!r.ok || d.error) throw new Error(d.error || ("HTTP " + r.status));
  return d;

function useStored(key, fb) {
  const [val, setVal] = useState(() => get(key, fb));

  const save = useCallback((next) => { set(key, next); setVal(next); }, [key]);
  return [val, save];
}

function Grb({ size = 46, sirina }) {
  const w = sirina || Math.round(size * 1.7);
  return (
    <img src={ZASTAVA} alt="Zastava Republike Hrvatske"
      style={{ width: w, height: "auto", display: "block", borderRadius: 2,
               border: `1px solid ${C.line}`, boxShadow: "0 3px 10px rgba(0,0,0,.45)" }} />

// ---------------------------------------------------------------------------
// APP
// ---------------------------------------------------------------------------
function App() {
  const [mus, setMus] = useStored(K_MUS, []);
  const [users, setUsers] = useStored(K_USERS, []);
  const [cfg, setCfg] = useStored(K_CFG, { proxyUrl: "" });
  const [me, setMe] = useState(() => { const id = get(K_SESSION, null); return id ? get(K_USERS, []).find((u) => u.id === id) || null : null; });

  useEffect(() => {
    if (!me) return;
    const fresh = users.find((u) => u.id === me.id);
    if (!fresh) { setMe(null); set(K_SESSION, null); }
    else if (JSON.stringify(fresh) !== JSON.stringify(me)) setMe(fresh);
  }, [users]);

  const prijava = (u) => { setMe(u); set(K_SESSION, u.id); set(K_DEVICE, u.ime); };
  const odjava = () => { setMe(null); set(K_SESSION, null); };

  return (
    <div style={{ minHeight: "100vh", color: C.ink, fontFamily: C.sans, borderTop: `3px solid ${C.crven}`, background: "radial-gradient(1100px 340px at 50% -100px, #191D27, #0F1117 60%)" }}>
      {me ? <Shell me={me} mus={mus} setMus={setMus} users={users} setUsers={setUsers} cfg={cfg} setCfg={setCfg} onLogout={odjava} />
          : <Prijava users={users} setUsers={setUsers} onLogin={prijava} />}
    </div>
  );
}

// ---------------------------------------------------------------------------
// PRIJAVA
// ---------------------------------------------------------------------------
function Prijava({ users, setUsers, onLogin }) {
  const [mode, setMode] = useState("login");
  const [ime, setIme] = useState(get(K_DEVICE, ""));
  const [lozinka, setLozinka] = useState(""); const [l2, setL2] = useState(""); const [err, setErr] = useState("");
  const login = () => {
    const u = users.find((x) => x.ime.toLowerCase() === ime.trim().toLowerCase());
    if (!u || u.password == null) return setErr("Nisi aktiviran ili ne postojiš. Klikni „Prvi put se prijavljuješ?“.");
    if (u.password !== lozinka) return setErr("Pogrešna lozinka.");
    onLogin(u);
  };
  const aktiviraj = () => {
    const u = users.find((x) => x.ime.toLowerCase() === ime.trim().toLowerCase());
    if (!u) return setErr("Tvoje ime nije na listi. Javi se administratoru jedinice.");
    if (u.password != null) return setErr("Već si aktiviran. Prijavi se lozinkom.");
    if (!lozinka.trim()) return setErr("Upiši lozinku.");
    if (lozinka !== l2) return setErr("Lozinke se ne poklapaju.");
    setUsers(users.map((x) => x.id === u.id ? { ...x, password: lozinka } : x));
    onLogin({ ...u, password: lozinka });
  };
  return (
    <div style={{ maxWidth: 400, margin: "10vh auto 0", padding: 24 }} className="view">
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", marginBottom: 26 }}>
        <Grb sirina={300} />
        <div style={{ ...eyebrow, marginTop: 18 }}>War Era · Republika Hrvatska</div>
        <h1 style={{ fontFamily: C.display, fontSize: 36, margin: "3px 0 0", letterSpacing: 2, fontWeight: 700 }}>ZAPOVJEDNI CENTAR</h1>
      </div>
      <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 5, padding: 22, boxShadow: "0 14px 44px rgba(0,0,0,.45)" }}>
        {mode === "login" ? (<>
          <Polje label="Korisničko ime"><input style={inp} value={ime} autoFocus onChange={(e) => { setIme(e.target.value); setErr(""); }} onKeyDown={(e) => e.key === "Enter" && login()} /></Polje>
          <Polje label="Lozinka" style={{ marginTop: 14 }}><input style={inp} type="password" value={lozinka} onChange={(e) => { setLozinka(e.target.value); setErr(""); }} onKeyDown={(e) => e.key === "Enter" && login()} /></Polje>
          {err && <div style={{ color: C.crven, fontFamily: C.mono, fontSize: 12, marginTop: 12 }}>{err}</div>}
          <button style={{ ...btn, width: "100%", marginTop: 18 }} onClick={login}>Prijavi se</button>
          <button style={{ background: "none", border: "none", color: C.ink2, fontFamily: C.mono, fontSize: 12, marginTop: 14, cursor: "pointer", textDecoration: "underline", width: "100%" }} onClick={() => { setMode("aktivacija"); setErr(""); setLozinka(""); setL2(""); }}>Prvi put se prijavljuješ?</button>
        </>) : (<>
          <div style={{ fontFamily: C.display, fontSize: 20, letterSpacing: 1, fontWeight: 600, marginBottom: 4 }}>Prva prijava</div>
          <p style={{ color: C.ink2, fontSize: 13, margin: "0 0 16px" }}>Upiši svoje ime onako kako te administrator dodao i postavi lozinku.</p>
          <Polje label="Ime (kako te admin dodao)"><input style={inp} value={ime} autoFocus onChange={(e) => { setIme(e.target.value); setErr(""); }} /></Polje>
          <Polje label="Nova lozinka" style={{ marginTop: 14 }}><input style={inp} type="password" value={lozinka} onChange={(e) => { setLozinka(e.target.value); setErr(""); }} /></Polje>
          <Polje label="Potvrdi lozinku" style={{ marginTop: 14 }}><input style={inp} type="password" value={l2} onChange={(e) => { setL2(e.target.value); setErr(""); }} onKeyDown={(e) => e.key === "Enter" && aktiviraj()} /></Polje>
          {err && <div style={{ color: C.crven, fontFamily: C.mono, fontSize: 12, marginTop: 12 }}>{err}</div>}
          <button style={{ ...btn, width: "100%", marginTop: 18 }} onClick={aktiviraj}>Postavi lozinku i uđi</button>
          <button style={{ background: "none", border: "none", color: C.ink2, fontFamily: C.mono, fontSize: 12, marginTop: 14, cursor: "pointer", textDecoration: "underline", width: "100%" }} onClick={() => { setMode("login"); setErr(""); }}>Natrag na prijavu</button>
        </>)}
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// DROPDOWN JEDINICA
// ---------------------------------------------------------------------------
function MuDropdown({ mus, muId, onSelect, onCreate }) {
  const [open, setOpen] = useState(false); const [adding, setAdding] = useState(false);
  const [naziv, setNaziv] = useState(""); const [tag, setTag] = useState("");
  const ref = useRef(null);
  useEffect(() => { const d = (e) => { if (ref.current && !ref.current.contains(e.target)) { setOpen(false); setAdding(false); } }; document.addEventListener("mousedown", d); return () => document.removeEventListener("mousedown", d); }, []);
  const cur = mus.find((m) => m.id === muId);
  const create = () => { if (!naziv.trim()) return; const id = onCreate(naziv.trim(), tag.trim()); setNaziv(""); setTag(""); setAdding(false); setOpen(false); if (id) onSelect(id); };
  return (
    <div ref={ref} style={{ position: "relative" }}>
      <button onClick={() => setOpen((o) => !o)} style={{ ...btnGhost, display: "flex", alignItems: "center", gap: 10, fontFamily: C.display, fontSize: 16, letterSpacing: 0.5, padding: "8px 12px", color: C.ink }}>
        <span>{cur ? cur.naziv : "Odaberi jedinicu"}</span>{cur && <span style={{ fontFamily: C.mono, fontSize: 10, color: C.dim }}>{cur.tag}</span>}<Chevron open={open} />
      </button>
      {open && (
        <div className="dd" style={{ position: "absolute", top: "calc(100% + 6px)", left: 0, minWidth: 250, background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 5, boxShadow: "0 16px 38px rgba(0,0,0,.5)", zIndex: 30, overflow: "hidden" }}>
          {mus.map((m) => (
            <button key={m.id} className="dd-item" onClick={() => { onSelect(m.id); setOpen(false); }} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", width: "100%", background: "transparent", border: "none", borderLeft: `3px solid ${m.id === muId ? C.crven : "transparent"}`, color: C.ink, fontFamily: C.display, fontSize: 15, letterSpacing: 0.5, padding: "10px 12px", cursor: "pointer", textAlign: "left" }}>
              <span>{m.naziv}</span><span style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontFamily: C.mono, fontSize: 10, color: C.dim }}>{m.tag}</span>{m.id === muId && <span style={{ color: C.crven, fontSize: 12 }}>✓</span>}</span>
            </button>
          ))}
          <div style={{ height: 1, background: C.line }} />
          {!adding ? (
            <button className="dd-item" onClick={() => setAdding(true)} style={{ display: "flex", alignItems: "center", gap: 8, width: "100%", background: "transparent", border: "none", color: C.zlato, fontFamily: C.mono, fontSize: 12, letterSpacing: 1, padding: "10px 12px", cursor: "pointer", textTransform: "uppercase" }}><span style={{ fontSize: 16, lineHeight: 1 }}>＋</span> Nova jedinica</button>
          ) : (
            <div style={{ padding: 12, display: "grid", gap: 8 }}>
              <input style={inp} autoFocus value={naziv} onChange={(e) => setNaziv(e.target.value)} placeholder="Naziv jedinice" onKeyDown={(e) => e.key === "Enter" && create()} />
              <div style={{ display: "flex", gap: 8 }}><input style={{ ...inp, width: 110 }} value={tag} onChange={(e) => setTag(e.target.value)} placeholder="Oznaka" onKeyDown={(e) => e.key === "Enter" && create()} /><button style={{ ...btn, flex: 1 }} onClick={create}>Kreiraj</button></div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ---------------------------------------------------------------------------
// OKVIR
// ---------------------------------------------------------------------------
function Shell({ me, mus, setMus, users, setUsers, cfg, setCfg, onLogout }) {
  const jeAdmin = me.role === "admin";
  const mozeObjaviti = me.role === "admin" || me.role === "zapovjednik";
  const vidiPoruke = me.role === "admin" || me.role === "zapovjednik";

  const [muId, setMuId] = useState(jeAdmin ? (mus[0] ? mus[0].id : null) : me.muId);
  useEffect(() => { if (jeAdmin && !mus.find((m) => m.id === muId)) setMuId(mus[0] ? mus[0].id : null); }, [mus]);
  useEffect(() => { if (!jeAdmin) setMuId(me.muId); }, [me.muId]);

  const tabovi = [["ploca", "Nadzorna ploča"]];
  if (mozeObjaviti) tabovi.push(["bitke", "Bitke uživo"]);
  if (vidiPoruke) tabovi.push(["poruke", "Poruke"]);
  if (jeAdmin) tabovi.push(["admin", "Administracija"]);
  const [tab, setTab] = useState("ploca");
  useEffect(() => { if (!tabovi.some((t) => t[0] === tab)) setTab("ploca"); });

  const createMu = (naziv, tag) => { const id = newId(); setMus([...mus, { id, naziv: naziv.slice(0, 50), tag: (tag || "").slice(0, 8).toUpperCase() || "MU", wareraMuId: "" }]); return id; };
  const otvoriMu = (id) => { setMuId(id); setTab("ploca"); };
  const aktivnaMu = mus.find((m) => m.id === muId) || null;

  // plan iz bitke: prebaci na ploču s predloškom
  const [predlozak, setPredlozak] = useState(null);
  const planIzBitke = (naziv, link) => { setPredlozak({ naziv, link, k: newId() }); setTab("ploca"); };

  return (
    <div style={{ maxWidth: 920, margin: "0 auto", padding: "0 18px 56px" }}>
      <header style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, padding: "16px 0 14px", borderBottom: `1px solid ${C.line}` }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <Grb sirina={76} />
          <div><div style={eyebrow}>War Era · Vojna jedinica</div><div style={{ fontFamily: C.display, fontSize: 24, letterSpacing: 1.5, fontWeight: 700, lineHeight: 1.05 }}>ZAPOVJEDNI CENTAR</div></div>
        </div>
        <div style={{ fontFamily: C.mono, fontSize: 12, color: C.dim, textAlign: "right" }}>
          <div style={{ color: C.ink, fontWeight: 600 }}>{me.ime}</div>
          <div style={{ color: jeAdmin ? C.crven : C.dim }}>{ROLE_LABEL[me.role]}</div>
          <button style={{ ...btnGhost, fontSize: 11, padding: "3px 10px", marginTop: 6 }} onClick={onLogout}>Odjava</button>
        </div>
      </header>

      <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 0", borderBottom: `1px solid ${C.lineSoft}` }}>
        <span style={eyebrow}>Jedinica</span>
        {jeAdmin ? <MuDropdown mus={mus} muId={muId} onSelect={setMuId} onCreate={createMu} />
          : <span style={{ fontFamily: C.display, fontSize: 18, letterSpacing: 0.5, fontWeight: 600 }}>{aktivnaMu ? aktivnaMu.naziv : "—"} {aktivnaMu && <span style={{ color: C.dim, fontSize: 13, fontFamily: C.mono }}>· {aktivnaMu.tag}</span>}</span>}
      </div>

      {tabovi.length > 1 ? (
        <nav style={{ display: "flex", margin: "6px 0 22px", flexWrap: "wrap" }}>
          {tabovi.map(([key, label]) => (<button key={key} onClick={() => setTab(key)} style={{ ...btnGhost, border: "none", borderBottom: tab === key ? `3px solid ${C.crven}` : "3px solid transparent", color: tab === key ? C.ink : C.dim, fontSize: 15, padding: "10px 16px" }}>{label}</button>))}
        </nav>
      ) : <div style={{ height: 22 }} />}

      <div className="view" key={tab + ":" + muId}>
        {tab === "ploca" && <Ploca me={me} muId={muId} mozeObjaviti={mozeObjaviti} predlozak={predlozak} />}
        {tab === "bitke" && mozeObjaviti && <BitkeUzivo proxyUrl={cfg.proxyUrl} onMakePlan={planIzBitke} />}
        {tab === "poruke" && vidiPoruke && <Poruke me={me} muId={muId} />}
        {tab === "admin" && jeAdmin && <Admin me={me} mus={mus} setMus={setMus} users={users} setUsers={setUsers} cfg={cfg} setCfg={setCfg} onOpenMu={otvoriMu} />}
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// BITKE UŽIVO — sve trenutne bitke, auto-osvježavanje, direktni linkovi
// ---------------------------------------------------------------------------
function Drzava({ d, desno }) {
  if (!d) return <span style={{ color: C.dim, fontFamily: C.mono, fontSize: 12 }}>—</span>;
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 7, flexDirection: desno ? "row-reverse" : "row", minWidth: 0 }}>
      <span style={{ fontSize: 19, lineHeight: 1 }}>{d.flag || "🏳"}</span>
      <span style={{ fontFamily: C.display, fontSize: 16, fontWeight: 600, letterSpacing: 0.3, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{d.name || (d.code || "?")}</span>
    </span>
  );
}

function BitkeUzivo({ proxyUrl, onMakePlan }) {
  const [st, setSt] = useState({ loading: true, err: "", list: [], ts: null });
  const [auto, setAuto] = useState(true);
  const [filter, setFilter] = useState("");
  const [drzave, setDrzave] = useState(null);
  const [pokaziDrzave, setPokaziDrzave] = useState(false);

  const load = useCallback((tiho) => {
    setSt((s) => ({ ...s, loading: !tiho, err: tiho ? s.err : "" }));
    apiGet(proxyUrl, "/api/battles?limit=200")
      .then((d) => setSt({ loading: false, err: "", list: d.battles || [], ts: d.ts || Date.now() }))
      .catch((e) => setSt((s) => ({ ...s, loading: false, err: e.message })));
  }, [proxyUrl]);

  useEffect(() => { load(false); }, [load]);
  useEffect(() => { if (!auto) return; const t = setInterval(() => load(true), OSVJEZI_MS); return () => clearInterval(t); }, [auto, load]);

  const ucitajDrzave = () => {
    setPokaziDrzave((v) => !v);
    if (drzave) return;
    apiGet(proxyUrl, "/api/countries").then((d) => setDrzave(d.countries || [])).catch((e) => setDrzave({ err: e.message }));
  };

  const nazivBitke = (b) => {
    if (b.napadac || b.branitelj) {
      const a = (b.napadac && b.napadac.name) || "?", d = (b.branitelj && b.branitelj.name) || "?";
      const r = b.regija && b.regija.name;
      return r ? `${a} → ${d} (${r})` : `${a} → ${d}`;
    }
    return b.naziv || (b.id ? "Bitka " + String(b.id).slice(-6) : "Bitka");
  };

  const f = filter.trim().toLowerCase();
  const lista = !f ? st.list : st.list.filter((b) => JSON.stringify([b.napadac, b.branitelj, b.regija, b.naziv]).toLowerCase().includes(f));

  return (
    <section>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", gap: 10, flexWrap: "wrap", marginBottom: 14 }}>
        <div>
          <div style={eyebrow}>War Era</div>
          <h2 style={{ fontFamily: C.display, fontSize: 24, letterSpacing: 1, margin: "2px 0 0", fontWeight: 700, display: "flex", alignItems: "center", gap: 10 }}>
            Bitke uživo {auto && <span className="live" title="automatsko osvježavanje" />}
          </h2>
        </div>
        <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
          <input style={{ ...inp, width: 170 }} value={filter} onChange={(e) => setFilter(e.target.value)} placeholder="Filtriraj (država, regija)" />
          <button style={{ ...btnGhost, fontSize: 11, padding: "7px 10px" }} onClick={() => load(false)}>Osvježi</button>
          <button style={{ ...btnGhost, fontSize: 11, padding: "7px 10px", color: auto ? C.zelena : C.dim, borderColor: auto ? C.zelena : C.line }} onClick={() => setAuto((a) => !a)}>{auto ? "Auto ✓" : "Auto ✕"}</button>
          <button style={{ ...btnGhost, fontSize: 11, padding: "7px 10px" }} onClick={ucitajDrzave}>Države</button>
        </div>
      </div>

      {pokaziDrzave && (
        <div className="view" style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 5, padding: 14, marginBottom: 16 }}>
          <div style={{ ...eyebrow, marginBottom: 10 }}>Sve države u igri</div>
          {!drzave && <div style={{ color: C.dim, fontFamily: C.mono, fontSize: 12, display: "flex", gap: 8, alignItems: "center" }}><span className="spin" /> Dohvaćam…</div>}
          {drzave && drzave.err && <div style={{ color: C.crven, fontFamily: C.mono, fontSize: 12 }}>✕ {drzave.err}</div>}
          {Array.isArray(drzave) && (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(160px,1fr))", gap: 6 }}>
              {drzave.map((d) => (
                <div key={d.id} style={{ display: "flex", alignItems: "center", gap: 8, background: C.panel2, border: `1px solid ${C.lineSoft}`, borderRadius: 3, padding: "6px 9px" }}>
                  <span style={{ fontSize: 17 }}>{d.flag || "🏳"}</span>
                  <span style={{ fontSize: 13, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{d.name}</span>
                </div>
              ))}
            </div>
          )}
          {Array.isArray(drzave) && <div style={{ ...eyebrow, marginTop: 10 }}>ukupno {drzave.length}</div>}
        </div>
      )}

      {st.loading && <div style={{ color: C.dim, fontFamily: C.mono, fontSize: 13, display: "flex", alignItems: "center", gap: 8 }}><span className="spin" /> Dohvaćam bitke…</div>}
      {st.err && <div style={{ color: C.crven, fontFamily: C.mono, fontSize: 12.5, lineHeight: 1.6, background: C.panel, border: `1px solid ${C.crvenD}`, borderRadius: 4, padding: 12 }}>✕ {st.err}<br /><span style={{ color: C.dim }}>Provjeri je li proxy pokrenut i adresa točna (Administracija › Živi podaci).</span></div>}
      {!st.loading && !st.err && lista.length === 0 && <div style={{ color: C.dim, fontFamily: C.mono, fontSize: 13 }}>{st.list.length ? "Nema bitaka za taj filter." : "Trenutno nema aktivnih bitaka."}</div>}

      {lista.length > 0 && (
        <div style={{ display: "grid", gap: 8 }}>
          {lista.map((b, i) => (
            <div key={b.id || i} className="card" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, background: C.panel, border: `1px solid ${C.line}`, borderLeft: `3px solid ${b.isActive ? C.zelena : C.line}`, borderRadius: 4, padding: "10px 12px", animationDelay: Math.min(i, 10) * 30 + "ms" }}>
              <a className="battle" href={b.url || "#"} target="_blank" rel="noopener noreferrer" style={{ display: "flex", alignItems: "center", gap: 10, textDecoration: "none", color: C.ink, minWidth: 0, flex: 1, padding: "4px 6px", borderRadius: 3 }}>
                <Drzava d={b.napadac} />
                <span style={{ fontFamily: C.mono, fontSize: 12, color: C.crven, fontWeight: 600 }}>vs</span>
                <Drzava d={b.branitelj} />
                {b.regija && b.regija.name && <span style={{ fontFamily: C.mono, fontSize: 11, color: C.dim, whiteSpace: "nowrap" }}>· {b.regija.name}</span>}
              </a>
              <div style={{ display: "flex", gap: 6, alignItems: "center", whiteSpace: "nowrap" }}>
                <a className="linkbtn" href={b.url || "#"} target="_blank" rel="noopener noreferrer" style={{ ...btnGhost, fontSize: 11, padding: "6px 10px", textDecoration: "none", display: "inline-block" }}>Otvori →</a>
                <button style={{ ...btn, fontSize: 11, padding: "7px 11px" }} onClick={() => onMakePlan(nazivBitke(b), b.url || "")}>Plan</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {st.ts && <div style={{ ...eyebrow, marginTop: 12 }}>{lista.length} bitaka · zadnje osvježeno {hhmm(st.ts)}{auto ? ` · auto svakih ${OSVJEZI_MS / 1000}s` : ""}</div>}
    </section>
  );
}

// ---------------------------------------------------------------------------
// NADZORNA PLOČA
// ---------------------------------------------------------------------------
const prazn = { naziv: "", opis: "", link: "", prioritet: "VISOKO", kada: "" };

function Ploca({ me, muId, mozeObjaviti, predlozak }) {
  const [plans, setPlans] = useStored(K_PLANS, []);
  const [form, setForm] = useState(prazn);
  const [otvoren, setOtvoren] = useState(false);
  const [, setTick] = useState(0);
  const formRef = useRef(null);
  useEffect(() => { const t = setInterval(() => setTick((x) => x + 1), 60000); return () => clearInterval(t); }, []);

  useEffect(() => {
    if (!predlozak) return;
    setForm({ ...prazn, naziv: predlozak.naziv, link: predlozak.link });
    setOtvoren(true);
    setTimeout(() => { const el = formRef.current; if (el && el.scrollIntoView) el.scrollIntoView({ behavior: "smooth", block: "center" }); }, 60);
  }, [predlozak && predlozak.k]);

  const mine = useMemo(() => plans.filter((p) => p.muId === muId), [plans, muId]);
  const sada = Date.now();
  const nadolaz = mine.filter((p) => p.ts == null || p.ts >= sada).sort((a, b) => (a.ts ?? Infinity) - (b.ts ?? Infinity));
  const proslo = mine.filter((p) => p.ts != null && p.ts < sada).sort((a, b) => b.ts - a.ts);

  const mutate = (fn) => setPlans(fn(get(K_PLANS, [])));
  const objavi = () => {
    if (!form.naziv.trim() || !form.opis.trim() || !muId) return;
    mutate((list) => [{ id: newId(), muId, naziv: form.naziv.trim().slice(0, 90), opis: form.opis.trim().slice(0, 2000), link: safeUrl(form.link).slice(0, 300), prioritet: form.prioritet, ts: inputToUtc(form.kada), autor: me.ime, created: Date.now() }, ...list]);
    setForm(prazn); setOtvoren(false);
  };
  const obrisi = (id) => { if (window.confirm("Obrisati ovaj plan?")) mutate((list) => list.filter((x) => x.id !== id)); };

  if (!muId) return <p style={{ color: C.dim, fontFamily: C.mono, fontSize: 13 }}>Odaberi ili kreiraj jedinicu.</p>;

  return (
    <section>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 16, gap: 10, flexWrap: "wrap" }}>
        <div><div style={eyebrow}>Operacije</div><h2 style={{ fontFamily: C.display, fontSize: 24, letterSpacing: 1, margin: "2px 0 0", fontWeight: 700 }}>Planovi i naredbe</h2></div>
        {mozeObjaviti && !otvoren && <button style={btn} onClick={() => setOtvoren(true)}>+ Novi plan</button>}
      </div>

      {mozeObjaviti && otvoren && (
        <div ref={formRef} className="view" style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 5, padding: 18, marginBottom: 24 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
            <Polje label="Naziv bitke"><input style={inp} value={form.naziv} maxLength={90} onChange={(e) => setForm({ ...form, naziv: e.target.value })} placeholder="npr. Bitka za Zadar" /></Polje>
            <Polje label="Poveznica (link na bitku)"><input style={inp} value={form.link} maxLength={300} onChange={(e) => setForm({ ...form, link: e.target.value })} placeholder="https://app.warera.io/battle/..." /></Polje>
            <Polje label="Vrijeme (UTC)"><input style={inp} type="datetime-local" value={form.kada} onChange={(e) => setForm({ ...form, kada: e.target.value })} /></Polje>
            <Polje label="Prioritet"><select style={inp} value={form.prioritet} onChange={(e) => setForm({ ...form, prioritet: e.target.value })}>{PRIORITETI.map((x) => <option key={x} value={x}>{x}</option>)}</select></Polje>
          </div>
          <Polje label="Opis / naredbe" style={{ marginTop: 14 }}>
            <textarea style={{ ...inp, minHeight: 104, fontFamily: C.sans, fontSize: 14 }} value={form.opis} maxLength={2000} onChange={(e) => setForm({ ...form, opis: e.target.value })} placeholder={"1. Svi u bitku u navedeno vrijeme\n2. Čuvajte oružje za zadnjih sat\n3. Javite štetu u porukama"} />
          </Polje>
          <div style={{ display: "flex", gap: 8, marginTop: 16 }}><button style={btn} onClick={objavi}>Objavi</button><button style={btnGhost} onClick={() => { setOtvoren(false); setForm(prazn); }}>Odustani</button></div>
        </div>
      )}

      {mine.length === 0 && <p style={{ color: C.dim, fontFamily: C.mono, fontSize: 13 }}>Nema objavljenih planova za ovu jedinicu.</p>}

      {nadolaz.length > 0 && (<>
        <div style={{ ...eyebrow, color: C.ink2, margin: "4px 0 12px" }}>Nadolazeće i danas</div>
        <div style={{ display: "grid", gap: 12 }}>{nadolaz.map((p, i) => <PlanKartica key={p.id} idx={i} plan={p} proslo={false} defaultOpen={i === 0} mozeObrisati={me.role === "admin" || p.autor === me.ime} onDelete={obrisi} />)}</div>
      </>)}

      {proslo.length > 0 && (<>
        <div style={{ display: "flex", alignItems: "center", gap: 12, margin: "30px 0 12px" }}><div style={{ ...eyebrow, color: C.dim }}>Prošlo</div><div style={{ flex: 1, height: 1, background: C.lineSoft }} /></div>
        <div style={{ display: "grid", gap: 10 }}>{proslo.map((p, i) => <PlanKartica key={p.id} idx={i} plan={p} proslo={true} defaultOpen={false} mozeObrisati={me.role === "admin" || p.autor === me.ime} onDelete={obrisi} />)}</div>
      </>)}
    </section>
  );
}

function PlanKartica({ plan, proslo, mozeObrisati, onDelete, idx, defaultOpen }) {
  const [open, setOpen] = useState(!!defaultOpen);
  const akcent = proslo ? C.line : prioBoja[plan.prioritet];
  return (
    <article className={proslo ? "card-past" : "card"} style={{ background: proslo ? "transparent" : C.panel, border: `1px solid ${proslo ? C.lineSoft : C.line}`, borderLeft: `3px solid ${akcent}`, borderRadius: 5, opacity: proslo ? 0.55 : 1, overflow: "hidden", animationDelay: Math.min(idx, 8) * 45 + "ms" }}>
      <button className="head-btn" onClick={() => setOpen((o) => !o)} style={{ display: "block", width: "100%", textAlign: "left", background: "transparent", border: "none", cursor: "pointer", padding: "13px 15px", color: C.ink }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
          <span style={{ fontFamily: C.display, fontSize: 20, fontWeight: 600, letterSpacing: 0.6 }}>{plan.naziv}</span><Chevron open={open} color={proslo ? C.dim : C.crven} />
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 7, flexWrap: "wrap" }}>
          <Tag color={proslo ? C.dim : prioBoja[plan.prioritet]} dot>{plan.prioritet}</Tag>
          {plan.ts != null && <span style={{ fontFamily: C.mono, fontSize: 11.5, color: proslo ? C.dim : C.ink2 }}>{utcStamp(plan.ts)} UTC</span>}
          {proslo && <Tag color={C.dim}>Prošlo</Tag>}
        </div>
      </button>
      <Collapsible open={open}>
        <div style={{ padding: "0 15px 15px" }}>
          <p style={{ fontFamily: C.sans, fontSize: 14, lineHeight: 1.55, whiteSpace: "pre-wrap", margin: "2px 0 12px", color: proslo ? C.ink2 : C.ink }}>{plan.opis}</p>
          {plan.link && (
            <a className="linkbtn" href={plan.link} target="_blank" rel="noopener noreferrer" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, background: proslo ? C.lineSoft : C.panel2, border: `1px solid ${C.line}`, borderLeft: `3px solid ${proslo ? C.dim : C.crven}`, textDecoration: "none", fontFamily: C.display, fontSize: 15, fontWeight: 600, letterSpacing: 0.8, padding: "11px 14px", borderRadius: 3, color: C.ink }}>
              <span>Otvori bitku · {plan.naziv}</span><span style={{ fontFamily: C.mono, fontSize: 10.5, color: proslo ? C.dim : C.crven, letterSpacing: 1 }}>→</span>
            </a>
          )}
          <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 8, alignItems: "center", marginTop: 12 }}>
            <div style={{ fontFamily: C.mono, fontSize: 11, color: C.dim }}>Objavio {plan.autor} · {utcStamp(plan.created)}</div>
            {mozeObrisati && <button style={{ ...btnDanger, fontSize: 11, padding: "4px 10px" }} onClick={() => onDelete(plan.id)}>Obriši</button>}
          </div>
        </div>
      </Collapsible>
    </article>
  );
}

// ---------------------------------------------------------------------------
// PORUKE
// ---------------------------------------------------------------------------
function Poruke({ me, muId }) {
  const [all, setAll] = useStored(K_CHAT, []);
  const [draft, setDraft] = useState("");
  const dno = useRef(null); const prvi = useRef(true);
  const msgs = useMemo(() => all.filter((m) => m.muId === muId), [all, muId]);
  useEffect(() => { if (prvi.current && msgs.length) { dno.current && dno.current.scrollIntoView && dno.current.scrollIntoView(); prvi.current = false; } }, [msgs.length]);
  const posalji = () => { const t = draft.trim(); if (!t || !muId) return; const next = [...get(K_CHAT, []), { id: newId(), muId, author: me.ime, text: t.slice(0, 600), ts: Date.now() }].slice(-CHAT_LIMIT); setAll(next); setDraft(""); setTimeout(() => dno.current && dno.current.scrollIntoView && dno.current.scrollIntoView(), 0); };
  if (!muId) return <p style={{ color: C.dim, fontFamily: C.mono, fontSize: 13 }}>Odaberi jedinicu.</p>;
  return (
    <section>
      <div style={{ marginBottom: 12 }}><div style={eyebrow}>Zapovjedni kanal</div><h2 style={{ fontFamily: C.display, fontSize: 24, letterSpacing: 1, margin: "2px 0 0", fontWeight: 700 }}>Poruke</h2></div>
      <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 5, height: "54vh", overflowY: "auto", padding: 14 }}>
        {msgs.length === 0 && <div style={{ color: C.dim, fontFamily: C.mono, fontSize: 13 }}>Kanal je tih. Pošalji prvu poruku.</div>}
        {msgs.map((m) => { const ja = m.author === me.ime; return (
          <div key={m.id} style={{ marginBottom: 12 }}>
            <div style={{ fontFamily: C.mono, fontSize: 11, color: C.dim }}><span style={{ color: ja ? C.crven : C.ink, fontWeight: 600 }}>{m.author}</span>{"   "}{utcStamp(m.ts)}</div>
            <div style={{ fontSize: 14, lineHeight: 1.45, whiteSpace: "pre-wrap", marginTop: 2 }}>{m.text}</div>
          </div>); })}
        <div ref={dno} />
      </div>
      <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
        <input style={inp} value={draft} maxLength={600} onChange={(e) => setDraft(e.target.value)} onKeyDown={(e) => e.key === "Enter" && posalji()} placeholder="Poruka zapovjednicima" />
        <button style={btn} onClick={posalji}>Pošalji</button>
      </div>
      <p style={{ ...eyebrow, marginTop: 8 }}>Vidljivo samo zapovjednicima ove jedinice.</p>
    </section>
  );
}

// ---------------------------------------------------------------------------
// ADMINISTRACIJA
// ---------------------------------------------------------------------------
function Admin({ me, mus, setMus, users, setUsers, cfg, setCfg, onOpenMu }) {
  const [openUnit, setOpenUnit] = useState(mus[0] ? mus[0].id : null);
  const obrisiMu = (id) => { if (!window.confirm("Obrisati jedinicu i sve njene članove, planove i poruke?")) return; setMus(mus.filter((m) => m.id !== id)); setUsers(users.filter((u) => u.muId !== id)); set(K_PLANS, get(K_PLANS, []).filter((p) => p.muId !== id)); set(K_CHAT, get(K_CHAT, []).filter((c) => c.muId !== id)); };
  const promijeni = (id, patch) => setUsers(users.map((u) => u.id === id ? { ...u, ...patch } : u));
  const obrisiClana = (id) => { if (window.confirm("Obrisati člana?")) setUsers(users.filter((u) => u.id !== id)); };
  const ponisti = (id) => { if (window.confirm("Poništiti lozinku? Član će je morati ponovno postaviti.")) promijeni(id, { password: null }); };
  const dodajClana = (muId, ime, role) => { const n = ime.trim(); if (!n) return false; if (users.some((u) => u.ime.toLowerCase() === n.toLowerCase())) { window.alert("Član s tim imenom već postoji."); return false; } setUsers([...users, { id: newId(), ime: n, role, muId, password: null }]); return true; };
  const dodajViše = (muId, imena) => {
    const postoje = new Set(users.map((u) => u.ime.toLowerCase())); const novi = [];
    imena.forEach((n) => { const nn = (n || "").trim(); if (nn && !postoje.has(nn.toLowerCase())) { postoje.add(nn.toLowerCase()); novi.push({ id: newId(), ime: nn, role: "vojnik", muId, password: null }); } });
    if (novi.length) setUsers([...users, ...novi]);
    return novi.length;
  };
  const postaviWarera = (muId, val, naziv) => setMus(mus.map((m) => m.id === muId ? { ...m, wareraMuId: val, wareraNaziv: naziv || m.wareraNaziv } : m));

  return (
    <section>
      <Postavke cfg={cfg} setCfg={setCfg} />
      <div style={{ ...eyebrow, marginTop: 30 }}>Upravljanje</div>
      <h2 style={{ fontFamily: C.display, fontSize: 24, letterSpacing: 1, margin: "2px 0 6px", fontWeight: 700 }}>Jedinice i članovi</h2>
      <p style={{ color: C.ink2, fontSize: 13, margin: "0 0 18px", lineHeight: 1.5 }}>Klikni jedinicu da otvoriš članove. Nove dodaješ preko „＋“ na vrhu. Unutar jedinice možeš odabrati pravi hrvatski MU iz igre i povući cijeli roster u whitelist.</p>
      {mus.length === 0 && <p style={{ color: C.dim, fontFamily: C.mono, fontSize: 13 }}>Još nema jedinica. Dodaj ih preko „＋“ na vrhu.</p>}
      <div style={{ display: "grid", gap: 12 }}>
        {mus.map((m) => (
          <UnitPanel key={m.id} m={m} open={openUnit === m.id} onToggle={() => setOpenUnit((o) => o === m.id ? null : m.id)}
            clanovi={users.filter((u) => u.muId === m.id)} proxyUrl={cfg.proxyUrl}
            onOpenMu={onOpenMu} onDeleteMu={obrisiMu} onChange={promijeni} onDeleteClan={obrisiClana} onReset={ponisti} onAdd={dodajClana} onAddMany={dodajViše} onSetWarera={postaviWarera} />
        ))}
      </div>
    </section>
  );
}

function Postavke({ cfg, setCfg }) {
  const [url, setUrl] = useState(cfg.proxyUrl || "");
  const [status, setStatus] = useState(null);
  const test = async () => {
    setStatus({ t: "load" });
    try { const d = await apiGet(url.trim(), "/health"); setStatus({ t: "ok", msg: `Veza radi (auth: ${d.auth || "none"}).` }); setCfg({ ...cfg, proxyUrl: url.trim() }); }
    catch (e) { setStatus({ t: "err", msg: e.message }); }
  };
  return (
    <div>
      <div style={eyebrow}>Postavke</div>
      <h2 style={{ fontFamily: C.display, fontSize: 22, letterSpacing: 1, margin: "2px 0 10px", fontWeight: 700 }}>Živi podaci (proxy)</h2>
      <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 5, padding: 16 }}>
        <p style={{ color: C.ink2, fontSize: 13, margin: "0 0 12px", lineHeight: 1.5 }}>Adresa War Era proxyja (npr. http://localhost:8787). Kad radi, kartica „Bitke uživo“ vuče sve trenutne bitke, a ovdje možeš birati hrvatske MU-ove i povlačiti rostere.</p>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end" }}>
          <Polje label="Proxy URL" style={{ flex: "1 1 260px" }}><input style={inp} value={url} onChange={(e) => setUrl(e.target.value)} placeholder="http://localhost:8787" onKeyDown={(e) => e.key === "Enter" && test()} /></Polje>
          <button style={btn} onClick={test}>Test veze</button>
          <button style={btnGhost} onClick={() => setCfg({ ...cfg, proxyUrl: url.trim() })}>Spremi</button>
        </div>
        {status && (
          <div style={{ marginTop: 10, fontFamily: C.mono, fontSize: 12 }}>
            {status.t === "load" && <span style={{ color: C.dim, display: "inline-flex", alignItems: "center", gap: 8 }}><span className="spin" /> Provjeravam…</span>}
            {status.t === "ok" && <span style={{ color: C.zelena }}>✓ {status.msg}</span>}
            {status.t === "err" && <span style={{ color: C.crven }}>✕ {status.msg}</span>}
          </div>
        )}
      </div>
    </div>
  );
}

function UnitPanel({ m, open, onToggle, clanovi, proxyUrl, onOpenMu, onDeleteMu, onChange, onDeleteClan, onReset, onAdd, onAddMany, onSetWarera }) {
  const [ime, setIme] = useState(""); const [role, setRole] = useState("vojnik");
  const [roster, setRoster] = useState(null);
  const [hrMu, setHrMu] = useState(null); // {loading|err|list}
  const add = () => { if (onAdd(m.id, ime, role)) { setIme(""); setRole("vojnik"); } };

  const ucitajHrMu = async () => {
    if (hrMu && hrMu.list) { setHrMu(null); return; }
    setHrMu({ loading: true });
    try { const d = await apiGet(proxyUrl, "/api/mus?country=Croatia"); setHrMu({ list: d.mus || [], scanned: d.scannedUsers }); }
    catch (e) { setHrMu({ err: e.message }); }
  };

  const povuciRoster = async (idOverride) => {
    const id = (idOverride || m.wareraMuId || "").trim();
    if (!id) { setRoster({ t: "err", msg: "Prvo odaberi hrvatski MU iz popisa." }); return; }
    setRoster({ t: "load" });
    try {
      const d = await apiGet(proxyUrl, "/api/mu/" + encodeURIComponent(id) + "/roster");
      const imena = (d.members || []).map((x) => x.username).filter(Boolean);
      if (!imena.length) { setRoster({ t: "err", msg: "Roster je prazan ili bez imena." }); return; }
      const dodano = onAddMany(m.id, imena);
      setRoster({ t: "ok", msg: `Povučeno ${imena.length}, novih dodano ${dodano}, već postojalo ${imena.length - dodano}.` });
    } catch (e) { setRoster({ t: "err", msg: e.message }); }
  };

  const poveziMu = (mu) => { onSetWarera(m.id, mu.id, mu.name); setHrMu(null); povuciRoster(mu.id); };

  return (
    <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 5, overflow: "hidden" }}>
      <div className="head-btn" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px", cursor: "pointer", gap: 8, flexWrap: "wrap" }} onClick={onToggle}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          <Chevron open={open} /><span style={{ fontFamily: C.display, fontSize: 19, fontWeight: 600, letterSpacing: 0.5 }}>{m.naziv}</span><Tag color={C.ink2}>{m.tag}</Tag>
          <span style={{ fontFamily: C.mono, fontSize: 11, color: C.dim }}>{clanovi.length} članova</span>
          {m.wareraMuId && <Tag color={C.zelena} dot>{m.wareraNaziv || "povezan"}</Tag>}
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <button style={{ ...btnGhost, fontSize: 11, padding: "5px 10px" }} onClick={(e) => { e.stopPropagation(); onOpenMu(m.id); }}>Otvori ploču</button>
          <button style={{ ...btnDanger, fontSize: 11, padding: "5px 10px" }} onClick={(e) => { e.stopPropagation(); onDeleteMu(m.id); }}>Obriši</button>
        </div>
      </div>

      <Collapsible open={open}>
        <div style={{ borderTop: `1px solid ${C.lineSoft}` }}>
          <div style={{ padding: 14, borderBottom: `1px solid ${C.lineSoft}`, background: "rgba(255,255,255,.015)" }}>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
              <span style={eyebrow}>Povezivanje s igrom</span>
              <button style={{ ...btnGhost, fontSize: 11, padding: "6px 10px" }} onClick={ucitajHrMu}>{hrMu && hrMu.list ? "Sakrij popis" : "Hrvatski MU-ovi"}</button>
              {m.wareraMuId && <>
                <button style={{ ...btn, fontSize: 11, padding: "6px 10px" }} onClick={() => povuciRoster()}>Povuci roster</button>
                <a href={`https://app.warera.io/mu/${m.wareraMuId}`} target="_blank" rel="noopener noreferrer" style={{ ...btnGhost, fontSize: 11, padding: "6px 10px", textDecoration: "none" }}>Otvori u igri →</a>
                <button style={{ ...btnGhost, fontSize: 11, padding: "6px 10px", color: C.dim }} onClick={() => onSetWarera(m.id, "", "")}>Odspoji</button>
              </>}
            </div>

            {hrMu && hrMu.loading && <div style={{ marginTop: 10, color: C.dim, fontFamily: C.mono, fontSize: 12, display: "flex", gap: 8, alignItems: "center" }}><span className="spin" /> Tražim hrvatske MU-ove…</div>}
            {hrMu && hrMu.err && <div style={{ marginTop: 10, color: C.crven, fontFamily: C.mono, fontSize: 12 }}>✕ {hrMu.err}</div>}
            {hrMu && hrMu.list && (
              <div className="view" style={{ marginTop: 10, display: "grid", gap: 6, maxHeight: 260, overflowY: "auto" }}>
                {hrMu.list.length === 0 && <div style={{ color: C.dim, fontFamily: C.mono, fontSize: 12 }}>Nije pronađen nijedan MU.</div>}
                {hrMu.list.map((x) => (
                  <div key={x.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, background: C.panel2, border: `1px solid ${C.lineSoft}`, borderRadius: 3, padding: "8px 10px" }}>
                    <div style={{ minWidth: 0 }}>
                      <span style={{ fontSize: 18, marginRight: 7 }}>🇭🇷</span>
                      <span style={{ fontFamily: C.display, fontSize: 15, fontWeight: 600 }}>{x.name || "(bez imena)"}</span>
                      {x.membersCount != null && <span style={{ fontFamily: C.mono, fontSize: 11, color: C.dim, marginLeft: 8 }}>{x.membersCount} članova</span>}
                    </div>
                    <button style={{ ...btn, fontSize: 11, padding: "6px 10px", whiteSpace: "nowrap" }} onClick={() => poveziMu(x)}>Poveži</button>
                  </div>
                ))}
                {hrMu.scanned != null && <div style={eyebrow}>skenirano {hrMu.scanned} igrača</div>}
              </div>
            )}

            {roster && <div style={{ marginTop: 10, fontFamily: C.mono, fontSize: 12 }}>
              {roster.t === "load" && <span style={{ color: C.dim, display: "inline-flex", alignItems: "center", gap: 8 }}><span className="spin" /> Dohvaćam roster…</span>}
              {roster.t === "ok" && <span style={{ color: C.zelena }}>✓ {roster.msg}</span>}
              {roster.t === "err" && <span style={{ color: C.crven }}>✕ {roster.msg}</span>}
            </div>}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1.2fr 0.9fr auto", gap: 10, padding: "10px 14px", ...eyebrow, borderBottom: `1px solid ${C.lineSoft}` }}><div>Ime</div><div>Uloga</div><div>Status</div><div></div></div>
          {clanovi.length === 0 && <div style={{ padding: 14, color: C.dim, fontFamily: C.mono, fontSize: 12 }}>Nema članova. Dodaj prvog dolje ili povuci roster.</div>}
          {clanovi.map((u) => {
            const aktivan = u.password != null;
            return (
              <div key={u.id} className="hrow" style={{ display: "grid", gridTemplateColumns: "1.4fr 1.2fr 0.9fr auto", gap: 10, padding: "10px 14px", alignItems: "center", borderBottom: `1px solid ${C.lineSoft}` }}>
                <div style={{ fontWeight: 600 }}>{u.ime}</div>
                <select style={{ ...inp, padding: "6px 8px" }} value={u.role} onChange={(e) => onChange(u.id, { role: e.target.value })}>{ROLES.filter((r) => r !== "admin").map((r) => <option key={r} value={r}>{ROLE_LABEL[r]}</option>)}</select>
                <div>{aktivan ? <Tag color={C.zelena} dot>Aktivan</Tag> : <Tag color={C.zlato} dot>Čeka</Tag>}</div>
                <div style={{ display: "flex", gap: 6, justifyContent: "flex-end" }}>
                  {aktivan && <button style={{ ...btnGhost, fontSize: 10.5, padding: "5px 8px" }} onClick={() => onReset(u.id)}>Reset</button>}
                  <button style={{ ...btnDanger, fontSize: 10.5, padding: "5px 8px" }} onClick={() => onDeleteClan(u.id)}>Obriši</button>
                </div>
              </div>
            );
          })}
          <div style={{ display: "flex", gap: 10, padding: 14, flexWrap: "wrap", alignItems: "flex-end" }}>
            <Polje label="Ime vojnika / zapovjednika" style={{ flex: "1 1 200px" }}><input style={inp} value={ime} onChange={(e) => setIme(e.target.value)} placeholder="npr. Tomislav" onKeyDown={(e) => e.key === "Enter" && add()} /></Polje>
            <Polje label="Uloga" style={{ width: 160 }}><select style={inp} value={role} onChange={(e) => setRole(e.target.value)}>{ROLES.filter((r) => r !== "admin").map((r) => <option key={r} value={r}>{ROLE_LABEL[r]}</option>)}</select></Polje>
            <button style={btn} onClick={add}>Dodaj na listu</button>
          </div>
        </div>
      </Collapsible>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
